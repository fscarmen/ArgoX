# ============================================================
# ArgoX 非交互安装配置文件 / Non-interactive install config
# ============================================================
# 使用方法 / Usage:
#   bash <(wget -qO- https://raw.githubusercontent.com/fscarmen/argox/main/argox.sh) -f config.conf
#
# 说明 / Notes:
#   - 留空的变量将使用脚本默认值 / Empty variables fall back to script defaults
#   - 极速模式 (-k/-l) 会忽略本文件，所有参数自动生成
#     Quick mode (-k/-l) ignores this file; all params are auto-generated
# ============================================================


# ── 语言 / Language ──────────────────────────────────────────
# C = 中文 / Chinese，E = 英文 / English
# 留空默认英文 / Default is English if empty
L=''


# ── 协议选择 / Protocol selection ────────────────────────────
# 字母组合，顺序无关，留空或 a = 全部安装
# Letter combination, order-insensitive; empty or a = install all
#
#   b = VLESS + Reality Vision
#   c = Hysteria2
#   d = VLESS + Reality gRPC
#   e = VLESS + WS
#   f = VMess + WS
#   g = Trojan + WS
#   h = Shadowsocks + WS
#   i = VLESS + XHTTP  （临时隧道不支持 / not supported on quick tunnel）
#
# 示例 / Examples:
#   INSTALL_PROTOCOLS='bcef'   # 只装 Reality Vision + Hysteria2 + VLESS-WS + VMess-WS
#   INSTALL_PROTOCOLS='a'      # 全部
#   INSTALL_PROTOCOLS=''       # 全部（默认）
INSTALL_PROTOCOLS=''


# ── Argo 隧道 / Argo Tunnel ───────────────────────────────────
# Argo 域名 / Argo domain
# 留空则使用临时隧道 / Use temporary tunnel if empty
# 例如 / e.g.: ARGO_DOMAIN='argo.example.com'
ARGO_DOMAIN=''

# Argo 认证信息（三选一）/ Argo auth (one of three formats)
#
# [Token 格式 / Token format]:
#   ARGO_AUTH='eyJhIjoiOWNjO...'
#
# [Json 格式 / Json format]:
#   ARGO_AUTH='{"AccountTag":"...","TunnelSecret":"...","TunnelID":"..."}'
#
# [API 令牌格式 / API token format - 40位 / 40 chars]:
#   ARGO_AUTH='01ab23cd45ef6789ghij0123klmnopqrs456tuvw'
#
# 留空则使用临时隧道 / Use temporary tunnel if empty
ARGO_AUTH=''


# ── 端口 / Ports ──────────────────────────────────────────────
# WS/XHTTP 协议内部起始端口（各协议在此基础上顺数）
# Starting port for WS/XHTTP protocols (each proto = start + offset)
# 范围 / Range: 100–65520，默认 / Default: 30000
# 留空使用默认值 / Leave empty for default
START_PORT=''

# Nginx 对外端口 / Nginx external port（cloudflared 指向此处）
# 范围 / Range: 100–65520，默认 / Default: 8080
# 仅安装 WS/XHTTP 协议时生效 / Only relevant when WS/XHTTP protocols are installed
NGINX_PORT=''


# ── Reality 配置 / Reality configuration ─────────────────────
# Reality 私钥 / Reality private key
# 留空则随机生成 / Random generation if empty
REALITY_PRIVATE=''


# SNI / TLS 域名（Reality 和 Hysteria2 共用）
# SNI / TLS server name (shared by Reality & Hysteria2)
# 默认 / Default: addons.mozilla.org
TLS_SERVER=''


# ── Hysteria2 端口跳跃 / Hysteria2 port hopping ───────────────
# 格式 / Format: 起始:结束 / start:end，例如 / e.g. 50000:51000
# 范围 / Range: 10000–65535
# 留空则禁用端口跳跃 / Leave empty to disable port hopping
PORT_HOPPING_RANGE=''


# ── WS/XHTTP 优选域名 / Preferred CDN domain ─────────────────
# 填入 CDN 优选域名或 IP / Preferred CDN domain or IP for WS/XHTTP
# 留空则使用脚本内置第一个 CDN / Default: first CDN in script list (skk.moe)
SERVER=''


# ── Xray 通用参数 / Xray common parameters ────────────────────
# 用户 UUID / User UUID
# 留空则随机生成 / Random generation if empty
UUID=''

# WebSocket / XHTTP 路径 / WebSocket / XHTTP path
# 仅支持字母、数字、- _ . @ / Only letters, numbers, - _ . @
# 留空则默认 argox / Default: argox
WS_PATH=''

# 节点名称 / Node name
# 留空则默认使用 VPS hostname / Default: VPS hostname
NODE_NAME=''


# ── 服务器 IP / Server IP ─────────────────────────────────────
# 支持 IPv4 或 IPv6 / Supports IPv4 or IPv6
# 留空则自动检测 / Auto-detected if empty
# 例如 / e.g.: SERVER_IP='1.2.3.4' 或 SERVER_IP='2001:db8::1'
SERVER_IP=''
